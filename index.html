  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

                <\u002Flabel>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  FIREBASE_CONFIG = {\n    apiKey: \"AIzaSyBLe0KaMmdCOptkGGqaqeuMSMHuNabmM9A\",\n    authDomain: \"invitation-mariage-8c925.firebaseapp.com\",\n    projectId: \"invitation-mariage-8c925\",\n    storageBucket: \"invitation-mariage-8c925.firebasestorage.app\",\n    messagingSenderId: \"1078167355432\",\n    appId: \"1:1078167355432:web:c8a2ce452fb0733b7c351d\"\n  };\n\n  DEFAULT_TEXTS = {\n    heroKicker: 'Nous nous marions',\n    heroSubtitle: \"Nous avons l'immense bonheur de vous inviter à célébrer notre mariage.\",\n    heroDate: '04 Septembre 2026',\n    letter: \"Chère famille, chers amis,\\n\\nVotre présence à nos côtés est déjà le plus beau des cadeaux.\\n\\nSi vous souhaitez nous accompagner davantage dans cette nouvelle aventure, nous avons imaginé une petite liste de mariage. Chaque participation, quelle qu'elle soit, contribuera à construire les premiers souvenirs de notre vie à deux.\\n\\nMerci du fond du cœur pour votre amour, votre soutien et votre générosité. Nous avons hâte de partager cette journée exceptionnelle avec vous.\",\n    listTitle: 'Notre liste de mariage',\n    listIntro: \"Si vous souhaitez nous faire plaisir, nous avons sélectionné trois projets qui nous tiennent particulièrement à cœur. Cliquez simplement sur celui auquel vous souhaitez contribuer.\",\n    projects: {\n      thermomix: { title: 'Notre futur Thermomix', desc: \"Pour débuter notre vie à deux autour de bons petits plats, nous rêvons d'un Thermomix qui accompagnera nos moments en cuisine pendant de nombreuses années.\", thanks: \"Merci infiniment de participer à ce beau projet.\\n\\nChaque contribution nous rapproche un peu plus de ce compagnon de cuisine qui nous permettra de partager de délicieux repas en famille et entre amis.\\n\\nVotre générosité fera partie de nos premiers souvenirs de jeunes mariés.\" },\n      voyage: { title: 'Notre voyage de noces', desc: \"Nous rêvons de commencer cette nouvelle aventure par un voyage inoubliable afin de créer nos tout premiers souvenirs de jeunes mariés.\", thanks: \"Merci de participer à notre voyage de noces.\\n\\nGrâce à votre générosité, nous pourrons vivre des moments uniques, découvrir de nouveaux paysages et commencer notre vie de couple avec des souvenirs qui resteront gravés à jamais.\\n\\nChaque contribution compte énormément pour nous.\" },\n      salon: { title: 'Notre futur salon', desc: \"Nous aimerions aménager notre premier foyer avec une belle télévision qui accompagnera nos soirées cinéma, nos moments de détente et nos futurs souvenirs en famille.\", thanks: \"Merci de contribuer à notre futur chez-nous.\\n\\nCette télévision fera partie de notre premier cocon et nous rappellera que notre famille et nos amis ont participé à construire notre bonheur.\\n\\nMerci infiniment pour votre soutien.\" }\n    }\n  };\n\n  state = { seen: {}, photos: {}, texts: JSON.parse(JSON.stringify(this.DEFAULT_TEXTS)), activeKey: null, country: null, copied: null, adminOpen: false, adminTab: 'photos', showAdminButton: false };\n  els = {};\n  refFns = {};\n\n  RIB = {\n    MA: { titulaire: 'Saad El Amrani', banque: 'Attijariwafa Bank', iban: 'MA64 0000 0000 0000 0000 0000 000', bic: 'BCMAMAMC', compte: '000 000 000 000 000 000 00' },\n    FR: { titulaire: 'Saad & Kenza', banque: 'BNP Paribas', iban: 'FR76 0000 0000 0000 0000 0000 000', bic: 'BNPAFRPP', compte: '00000000000' }\n  };\n\n  PROJECTS = [\n    { key: 'thermomix', alt: 'Thermomix' },\n    { key: 'voyage', alt: 'Voyage de noces' },\n    { key: 'salon', alt: 'Télévision géante' }\n  ];\n\n  deepMerge(base, override) {\n    if (!override || typeof override !== 'object') return base;\n    const out = Array.isArray(base) ? [...base] : { ...base };\n    Object.keys(override).forEach((k) => {\n      if (override[k] && typeof override[k] === 'object' && !Array.isArray(override[k]) && base[k]) {\n        out[k] = this.deepMerge(base[k], override[k]);\n      } else {\n        out[k] = override[k];\n      }\n    });\n    return out;\n  }\n\n  saveTexts(texts) {\n    this.setState({ texts });\n    try { localStorage.setItem('skwedding_texts', JSON.stringify(texts)); } catch (e) {}\n    if (this.docRef) this.docRef.set({ texts }, { merge: true }).catch((e) => console.warn(e));\n  }\n\n  setText(path, value) {\n    const texts = JSON.parse(JSON.stringify(this.state.texts));\n    let obj = texts;\n    for (let i = 0; i < path.length - 1; i++) obj = obj[path[i]];\n    obj[path[path.length - 1]] = value;\n    this.saveTexts(texts);\n  }\n\n  fieldHandler(path) {\n    return (e) => this.setText(path, e.target.value);\n  }\n\n  BLANK = 'data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///ywAAAAAAQABAAACAUwAOw==';\n  imgEls = {};\n  imgRefFns = {};\n\n  getImgRef(key) {\n    if (!this.imgRefFns[key]) this.imgRefFns[key] = (el) => { if (el) this.imgEls[key] = el; };\n    return this.imgRefFns[key];\n  }\n\n  applyPhotosToDom(photos) {\n    if (this.imgEls.hero) this.imgEls.hero.src = photos.hero || this.BLANK;\n    this.PROJECTS.forEach((p) => { if (this.imgEls[p.key]) this.imgEls[p.key].src = photos[p.key] || this.BLANK; });\n    ['hero', 'thermomix', 'voyage', 'salon'].forEach((k) => { if (this.imgEls['slot_' + k]) this.imgEls['slot_' + k].src = photos[k] || this.BLANK; });\n  }\n\n  componentDidMount() {\n    try {\n      const path = window.location.pathname || '';\n      const isAdminUrl = path.replace(/\\/$/, '').endsWith('/admin') || window.location.hash === '#admin';\n      if (isAdminUrl) this.setState({ showAdminButton: true });\n    } catch (e) {}\n    this.initCloud();\n    try {\n      const saved = JSON.parse(localStorage.getItem('skwedding_photos') || '{}');\n      this.setState({ photos: saved });\n      this.applyPhotosToDom(saved);\n    } catch (e) {}\n    try {\n      const savedTexts = JSON.parse(localStorage.getItem('skwedding_texts') || 'null');\n      if (savedTexts) this.setState({ texts: this.deepMerge(this.DEFAULT_TEXTS, savedTexts) });\n    } catch (e) {}\n    this.io = new IntersectionObserver((entries) => {\n      entries.forEach((en) => {\n        if (en.isIntersecting) {\n          const k = en.target.dataset.seenKey;\n          if (k) this.setState((s) => ({ seen: { ...s.seen, [k]: true } }));\n        }\n      });\n    }, { threshold: 0.15 });\n    Object.keys(this.els).forEach((k) => this.els[k] && this.io.observe(this.els[k]));\n  }\n\n  getRef(key) {\n    if (!this.refFns[key]) {\n      this.refFns[key] = (el) => { if (el) { this.els[key] = el; if (this.io) this.io.observe(el); } };\n    }\n    return this.refFns[key];\n  }\n\n  savePhotos(photos) {\n    this.setState({ photos });\n    this.applyPhotosToDom(photos);\n    try { localStorage.setItem('skwedding_photos', JSON.stringify(photos)); } catch (e) {}\n    if (this.docRef) this.docRef.set({ photos }, { merge: true }).catch((e) => console.warn(e));\n  }\n\n  onFile(key) {\n    return (e) => {\n      const file = e.target.files && e.target.files[0];\n      if (!file) return;\n      this.resizeImage(file).then((dataUrl) => this.savePhotos({ ...this.state.photos, [key]: dataUrl }));\n    };\n  }\n\n  resizeImage(file, maxWidth, quality) {\n    maxWidth = maxWidth || 1400; quality = quality || 0.82;\n    return new Promise((resolve) => {\n      const reader = new FileReader();\n      reader.onload = () => {\n        const img = new Image();\n        img.onload = () => {\n          const scale = Math.min(1, maxWidth / img.width);\n          const w = Math.round(img.width * scale);\n          const h = Math.round(img.height * scale);\n          const canvas = document.createElement('canvas');\n          canvas.width = w; canvas.height = h;\n          canvas.getContext('2d').drawImage(img, 0, 0, w, h);\n          resolve(canvas.toDataURL('image/jpeg', quality));\n        };\n        img.onerror = () => resolve(reader.result);\n        img.src = reader.result;\n      };\n      reader.readAsDataURL(file);\n    });\n  }\n\n  loadScript(src) {\n    return new Promise((resolve, reject) => {\n      if (document.querySelector('script[data-fb-src=\"' + src + '\"]')) { resolve(); return; }\n      const s = document.createElement('script');\n      s.src = src; s.dataset.fbSrc = src;\n      s.onload = () => resolve();\n      s.onerror = () => reject(new Error('Échec de chargement : ' + src));\n      document.head.appendChild(s);\n    });\n  }\n\n  async initCloud() {\n    try {\n      if (!window.firebase) {\n        await this.loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js');\n        await this.loadScript('https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js');\n      }\n      if (!window.firebase || !window.firebase.apps) return;\n      if (!window.firebase.apps.length) window.firebase.initializeApp(this.FIREBASE_CONFIG);\n      this.db = window.firebase.firestore();\n      this.docRef = this.db.collection('wedding').doc('content');\n      this.docRef.onSnapshot((snap) => {\n        if (!snap.exists) return;\n        const data = snap.data() || {};\n        if (data.photos) {\n          this.setState({ photos: data.photos });\n          this.applyPhotosToDom(data.photos);\n          try { localStorage.setItem('skwedding_photos', JSON.stringify(data.photos)); } catch (e) {}\n        }\n        if (data.texts) {\n          const merged = this.deepMerge(this.DEFAULT_TEXTS, data.texts);\n          this.setState({ texts: merged });\n          try { localStorage.setItem('skwedding_texts', JSON.stringify(merged)); } catch (e) {}\n        }\n      }, (err) => console.warn('Firestore sync error', err && err.message, err));\n    } catch (e) { console.warn('Firebase init error', e && e.message, e); }\n  }\n\n  clearPhoto(key) {\n    return () => { const p = { ...this.state.photos }; delete p[key]; this.savePhotos(p); };\n  }\n\n  copyText(text, tag) {\n    return () => {\n      const done = () => { this.setState({ copied: tag }); setTimeout(() => this.setState({ copied: null }), 2000); };\n      if (navigator.clipboard && navigator.clipboard.writeText) {\n        navigator.clipboard.writeText(text).then(done).catch(done);\n      } else { done(); }\n    };\n  }\n\n  renderVals() {\n    const seen = this.state.seen;\n    const heroSeen = true;\n    const introSeen = !!seen.intro;\n    const photos = this.state.photos || {};\n\n    const texts = this.state.texts;\n    const projects = this.PROJECTS.map((p) => ({\n      ...p,\n      title: texts.projects[p.key].title,\n      desc: texts.projects[p.key].desc,\n      photoOpacity: photos[p.key] ? 1 : 0,\n      imgRef: this.getImgRef(p.key),\n      setRef: this.getRef(p.key),\n      opacity: seen[p.key] ? 1 : 0,\n      cardTransform: seen[p.key] ? 'translateY(0)' : 'translateY(28px)',\n      openModal: () => this.setState({ activeKey: p.key, country: null })\n    }));\n\n    const activeProjectRaw = this.PROJECTS.find((p) => p.key === this.state.activeKey);\n    const activeProject = activeProjectRaw ? { title: texts.projects[activeProjectRaw.key].title, thanks: texts.projects[activeProjectRaw.key].thanks } : null;\n\n    const projectFields = this.PROJECTS.map((p) => ({\n      key: p.key,\n      label: texts.projects[p.key].title,\n      title: texts.projects[p.key].title,\n      desc: texts.projects[p.key].desc,\n      thanks: texts.projects[p.key].thanks,\n      onTitle: this.fieldHandler(['projects', p.key, 'title']),\n      onDesc: this.fieldHandler(['projects', p.key, 'desc']),\n      onThanks: this.fieldHandler(['projects', p.key, 'thanks'])\n    }));\n\n    const slotDef = (key, label) => ({ key, label, previewOpacity: photos[key] ? 1 : 0, imgRef: this.getImgRef('slot_' + key), onFile: this.onFile(key), onClear: this.clearPhoto(key) });\n    const photoSlots = [\n      slotDef('hero', 'Photo de fond (accueil)'),\n      slotDef('thermomix', 'Photo — Thermomix'),\n      slotDef('voyage', 'Photo — Voyage de noces'),\n      slotDef('salon', 'Photo — Futur salon')\n    ];\n\n    return {\n      setRefHero: this.getRef('hero'),\n      setRefIntro: this.getRef('intro'),\n      setHeroImgRef: this.getImgRef('hero'),\n      heroImgOpacity: photos.hero ? 1 : 0,\n      heroOverlayTop: photos.hero ? 0.35 : 0.15,\n      heroOverlayBottom: photos.hero ? 0.55 : 0.4,\n      heroOpacity: heroSeen ? 1 : 0,\n      heroTransform: 'translateY(0)',\n      heroTextColor: photos.hero ? '#fbf6ec' : '#3a332b',\n      heroTextMuted: photos.hero ? 'rgba(251,246,236,0.85)' : '#8a7a55',\n      heroBorderColor: photos.hero ? 'rgba(251,246,236,0.5)' : '#d8c69b',\n      heroBadgeBg: photos.hero ? 'rgba(255,255,255,0.12)' : 'rgba(255,255,255,0.6)',\n      scrollToList: () => { const el = this.els.intro; if (el) el.scrollIntoView({ behavior: 'smooth' }); },\n      introOpacity: introSeen ? 1 : 0,\n      introTransform: introSeen ? 'translateY(0)' : 'translateY(24px)',\n      projects,\n      activeProject,\n      closeModal: () => this.setState({ activeKey: null, country: null }),\n      stopPropagation: (e) => e.stopPropagation(),\n      chooseMA: () => this.setState((s) => ({ country: s.country === 'ma' ? null : 'ma' })),\n      chooseFR: () => this.setState((s) => ({ country: s.country === 'fr' ? null : 'fr' })),\n      showMA: this.state.country === 'ma',\n      showFR: this.state.country === 'fr',\n      borderMA: this.state.country === 'ma' ? '#c6a25f' : '#e6dbc2',\n      borderFR: this.state.country === 'fr' ? '#8fa377' : '#e0e6d6',\n      bgMA: this.state.country === 'ma' ? '#f7f1e3' : '#fffdf9',\n      bgFR: this.state.country === 'fr' ? '#f0f2ea' : '#fffdf9',\n      ribMA: this.RIB.MA,\n      ribFR: this.RIB.FR,\n      copyMA: this.copyText(this.RIB.MA.iban, 'MA'),\n      copyFR: this.copyText(this.RIB.FR.iban, 'FR'),\n      copyLabelMA: this.state.copied === 'MA' ? 'Copié !' : \"Copier l'IBAN\",\n      copyLabelFR: this.state.copied === 'FR' ? 'Copié !' : \"Copier l'IBAN\",\n      adminOpen: this.state.adminOpen,\n      showAdminButton: this.state.showAdminButton,\n      toggleAdmin: () => this.setState((s) => ({ adminOpen: !s.adminOpen })),\n      photoSlots,\n      texts,\n      projectFields,\n      isPhotosTab: this.state.adminTab === 'photos',\n      isTextesTab: this.state.adminTab === 'textes',\n      setAdminTabPhotos: () => this.setState({ adminTab: 'photos' }),\n      setAdminTabTextes: () => this.setState({ adminTab: 'textes' }),\n      tabPhotosBorder: this.state.adminTab === 'photos' ? '#c6a25f' : 'transparent',\n      tabTextesBorder: this.state.adminTab === 'textes' ? '#c6a25f' : 'transparent',\n      tabPhotosColor: this.state.adminTab === 'photos' ? '#3a332b' : '#8a7a55',\n      tabTextesColor: this.state.adminTab === 'textes' ? '#3a332b' : '#8a7a55',\n      fieldHeroKicker: this.fieldHandler(['heroKicker']),\n      fieldHeroSubtitle: this.fieldHandler(['heroSubtitle']),\n      fieldHeroDate: this.fieldHandler(['heroDate']),\n      fieldLetter: this.fieldHandler(['letter']),\n      fieldListTitle: this.fieldHandler(['listTitle']),\n      fieldListIntro: this.fieldHandler(['listIntro'])\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
